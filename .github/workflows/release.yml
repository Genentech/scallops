name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Triggers automatically on release tags like v1.0.0
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, do not publish)'
        required: true
        type: boolean
        default: true

# Top-level security: least privilege by default
permissions:
  contents: read

# Cancel superseded runs to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Dropped macos-13 to prevent 'us-default' deprecation errors.
        # macos-14 (Apple Silicon) will handle both ARM and Intel architectures.
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for setuptools_scm versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Fix #1: Install virtualenv natively to bypass the HTTP 429 rate limit
      - name: Install cibuildwheel and virtualenv
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel==2.22.0 virtualenv

      # Fix #2: Install Rosetta 2 so the macos-14 ARM runner can test Intel (x86_64) wheels
      - name: Install Rosetta 2 (Apple Silicon)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        run: |
          echo "Installing Rosetta 2 for x86_64 compatibility..."
          sudo softwareupdate --install-rosetta --agree-to-license

      # Fix #3: Safely evaluate Python 3.13 support without triggering bash 'set -e' crashes
      - name: Determine Python 3.13 Support
        id: check-numpy
        shell: bash
        run: |
          SKIP="pp* *-win32 *-manylinux_i686"
          
          if [ ! -f "pyproject.toml" ]; then
            echo "pyproject.toml not found. Skipping Python 3.13."
            echo "CIBW_SKIP=$SKIP cp313-*" >> $GITHUB_ENV
            exit 0
          fi
          
          # Disable fail-fast temporarily to capture the python exit code
          set +e
          python - <<'PYTHON_SCRIPT'
          import re, sys, pathlib
          content = pathlib.Path("pyproject.toml").read_text(encoding="utf-8", errors="ignore")
          blocks = re.findall(
              r'\[(?:project|tool\..+)\.(?:dependencies|optional-dependencies.*)\](.*?)\n\[',
              content + "\n[",
              flags=re.S
          )
          text = "\n".join(blocks)
          pattern = r'(?i)\bnumpy\b\s*(?:>=|~=)\s*["\']?\s*2(\D|$)'
          sys.exit(0 if re.search(pattern, text) else 1)
          PYTHON_SCRIPT
          
          PY_EXIT_CODE=$?
          set -e  # Re-enable fail-fast immediately
          
          if [ $PY_EXIT_CODE -eq 0 ]; then
            echo "CIBW_SKIP=$SKIP" >> $GITHUB_ENV
          else
            echo "CIBW_SKIP=$SKIP cp313-*" >> $GITHUB_ENV
          fi

      # Fix #4: Use `python -m` instead of the action wrapper to utilize the shared virtualenv
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.11"
          CIBW_SKIP: ${{ env.CIBW_SKIP }}
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_TEST_REQUIRES: pytest pytest-xdist

          # Fix #5: Inject C-headers into the CentOS Docker container for pysam/HTSlib
          CIBW_BEFORE_ALL_LINUX: "yum install -y bzip2-devel xz-devel zlib-devel"

          # Fix #6: Strict Test Isolation (Forces tests against the built wheel, not source tree)
          CIBW_TEST_COMMAND_LINUX: >
            bash -c 'TEST_DIR="{project}/scallops/tests" &&
            cd /tmp && pytest -n auto "$TEST_DIR" -v --tb=short'

          CIBW_TEST_COMMAND_MACOS: >
            bash -c 'TEST_DIR="{project}/scallops/tests" &&
            cd /tmp && pytest -n auto "$TEST_DIR" -v --tb=short'

          CIBW_TEST_COMMAND_WINDOWS: >
            powershell -Command "
            $TestDir = '{project}\scallops\tests';
            Set-Location $env:TEMP;
            pytest -n auto $TestDir -v --tb=short
            "

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz
          retention-days: 7

  publish_to_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      id-token: write  # Required for PyPI Trusted Publishing (OIDC)
      contents: read   # Required to download artifacts securely

    # Ensure this only publishes on tags, OR on manual runs where dry_run is unchecked
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: List artifacts to be published
        run: |
          echo "Artifacts to publish:"
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

          # If Trusted Publishing via OIDC fails:
          # 1. Comment out the `permissions:` block at the top of this job
          # 2. Add PYPI_API_TOKEN to your repository secrets
          # 3. Uncomment the two lines below:
          # user: __token__
          # password: ${{ secrets.PYPI_API_TOKEN }}

          # Future enhancement (ecosystem not yet mature):
          # generate-provenance: true