name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v0.0.1, v1.0.0

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Mac (Intel & Silicon), Windows, and Linux
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for setuptools_scm versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.22.0

      # Robust NumPy detection using Python regex
      - name: Determine Python 3.13 Support
        id: check-numpy
        shell: bash
        run: |
          SKIP="pp* *-win32 *-manylinux_i686"
          
          if python -c "
          import re, sys
          with open('pyproject.toml') as f:
              content = f.read()
          # Match numpy >= 2.x or numpy ~= 2.x
          pattern = r'numpy\s*(?:>=|~=)\s*2'
          sys.exit(0 if re.search(pattern, content) else 1)
          " 2>/dev/null; then
            echo "✓ NumPy 2.x support detected. Building Python 3.13."
          else
            echo "⚠ NumPy 2.x not detected. Skipping Python 3.13 to prevent crashes."
            SKIP="$SKIP cp313-*"
          fi
          
          echo "CIBW_SKIP=$SKIP" >> $GITHUB_ENV

      - name: List intended builds
        run: python -m cibuildwheel --print-build-identifiers
        env:
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.11"
          CIBW_SKIP: ${{ env.CIBW_SKIP }}

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.11"
          CIBW_SKIP: ${{ env.CIBW_SKIP }}

          # Install pytest in the isolated wheel environment
          CIBW_TEST_REQUIRES: pytest
          # Run tests against the installed wheel using the {project} placeholder
          CIBW_TEST_COMMAND: "pytest {project}/scallops/tests"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish_to_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    # Required permissions for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # with:
          # Commented out token auth in favor of Trusted Publishing above.
          # If it fails, remove the `permissions` block above, uncomment `with:`, and uncomment these:
          # user: __token__
          # password: ${{ secrets.PYPI_API_TOKEN }}